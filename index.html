<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>艺安查 — AI驱动的艺人风险评估平台</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
/* ============================================
   艺安查 Design System v2.0 — 科技感 + 清爽
   ============================================ */

/* === 导入现代字体 === */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

:root {
  /* === 主色调 - 科技蓝紫渐变 === */
  --primary: #6366F1;
  --primary-light: #818CF8;
  --primary-dark: #4F46E5;
  --primary-50: #EEF2FF;
  --primary-100: #E0E7FF;
  --primary-200: #C7D2FE;
  
  /* === 辅助色 - 科技感渐变 === */
  --accent-cyan: #06B6D4;
  --accent-purple: #A855F7;
  --accent-pink: #EC4899;
  
  /* === 风险等级色 === */
  --risk-safe: #10B981;
  --risk-low: #34D399;
  --risk-mid: #F59E0B;
  --risk-high: #F97316;
  --risk-extreme: #EF4444;
  --risk-pending: #9CA3AF;
  
  /* === 热度等级色 === */
  --heat-s: #F59E0B;
  --heat-a: #EF4444;
  --heat-b: #6366F1;
  --heat-c: #9CA3AF;
  
  /* === 商业价值色 === */
  --value-s: #8B5CF6;
  --value-a: #6366F1;
  --value-b: #06B6D4;
  --value-c: #9CA3AF;
  
  /* === 中性色 - 清爽浅灰 === */
  --gray-50: #F9FAFB;
  --gray-100: #F3F4F6;
  --gray-200: #E5E7EB;
  --gray-300: #D1D5DB;
  --gray-400: #9CA3AF;
  --gray-500: #6B7280;
  --gray-600: #4B5563;
  --gray-700: #374151;
  --gray-800: #1F2937;
  --gray-900: #111827;
  
  /* === 背景色 - 清爽白 === */
  --bg-primary: #FFFFFF;
  --bg-secondary: #F8FAFC;
  --bg-tertiary: #F1F5F9;
  
  /* === 文字色 === */
  --text-primary: #0F172A;
  --text-secondary: #475569;
  --text-tertiary: #94A3B8;
  --text-inverse: #FFFFFF;
  
  /* === 边框 === */
  --border-light: #E2E8F0;
  --border-medium: #CBD5E1;
  
  /* === 阴影 - 更柔和 === */
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.06), 0 2px 4px -2px rgba(0,0,0,0.06);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.06), 0 4px 6px -4px rgba(0,0,0,0.06);
  --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.06), 0 8px 10px -6px rgba(0,0,0,0.06);
  --shadow-glow: 0 0 20px rgba(99,102,241,0.15);
  
  /* === 圆角 === */
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 20px;
  --radius-full: 9999px;
  
  /* === 间距 === */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;
  
  /* === 字体 === */
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  --font-mono: 'SF Mono', 'Fira Code', monospace;
  
  /* === 过渡动画 === */
  --transition-fast: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-normal: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-slow: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  
  /* === 容器 === */
  --container-max: 1280px;
}

/* === 全局样式 === */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-sans);
  color: var(--text-primary);
  background: var(--bg-secondary);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}

/* === 自定义滚动条 === */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--gray-400); }

/* === 加载动画 === */
.spinner { 
  display: inline-block; 
  width: 36px; 
  height: 36px; 
  border: 3px solid var(--gray-200); 
  border-top-color: var(--primary); 
  border-radius: 50%; 
  animation: spin 0.8s linear infinite; 
}

.spinner-sm { width: 20px; height: 20px; border-width: 2px; }

@keyframes spin { 
  to { transform: rotate(360deg); } 
}

.loading-overlay { 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  justify-content: center; 
  padding: 80px 20px; 
  gap: 16px; 
  color: var(--text-tertiary); 
  font-size: 14px; 
}

/* === 骨架屏动画 === */
.skeleton { 
  background: linear-gradient(90deg, var(--gray-100) 25%, var(--gray-200) 50%, var(--gray-100) 75%);
  background-size: 200% 100%; 
  animation: shimmer 1.8s ease-in-out infinite; 
  border-radius: var(--radius-md); 
}

@keyframes shimmer { 
  0% { background-position: 200% 0; } 
  100% { background-position: -200% 0; } 
}

.skeleton-card { height: 88px; border-radius: var(--radius-lg); }
.skeleton-stat { height: 120px; border-radius: var(--radius-lg); }
.skeleton-text { height: 16px; margin-bottom: 8px; border-radius: 4px; }

/* === Toast 通知 - 玻璃态 === */
.toast-container { 
  position: fixed; 
  top: 72px; 
  right: 24px; 
  z-index: 5000; 
  display: flex; 
  flex-direction: column; 
  gap: 12px; 
}

.toast { 
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: var(--radius-lg); 
  box-shadow: var(--shadow-xl); 
  border: 1px solid rgba(255, 255, 255, 0.8);
  padding: var(--space-4) var(--space-6); 
  display: flex; 
  align-items: center; 
  gap: var(--space-3); 
  font-size: 14px; 
  transform: translateX(120%); 
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
  max-width: 380px; 
}

.toast.show { transform: translateX(0); }

.toast-success { border-left: 4px solid var(--success); }
.toast-error { border-left: 4px solid var(--error); }
.toast-warning { border-left: 4px solid var(--warning); }
.toast-info { border-left: 4px solid var(--info); }

/* === 顶部导航 - 玻璃态 === */
.top-nav {
  position: fixed; 
  top: 0; 
  left: 0; 
  right: 0; 
  height: 64px;
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-light);
  display: flex; 
  align-items: center; 
  padding: 0 var(--space-8);
  z-index: 1000; 
  gap: var(--space-6);
  transition: var(--transition-normal);
}

.top-nav .logo { 
  display: flex; 
  align-items: center; 
  gap: 10px; 
  text-decoration: none; 
  flex-shrink: 0; 
  cursor: pointer; 
}

.top-nav .logo-icon { 
  width: 36px; 
  height: 36px; 
  background: linear-gradient(135deg, var(--primary), var(--accent-purple));
  border-radius: var(--radius-md); 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  font-size: 14px; 
  color: white; 
  font-weight: 800; 
  box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
  transition: var(--transition-normal);
}

.top-nav .logo:hover .logo-icon {
  transform: scale(1.05);
  box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
}

.top-nav .logo-text { 
  font-weight: 700; 
  font-size: 18px; 
  color: var(--text-primary); 
  letter-spacing: -0.5px;
}

.top-nav .nav-search { 
  flex: 1; 
  max-width: 480px; 
  margin: 0 auto; 
}

.top-nav .nav-search input { 
  width: 100%; 
  padding: 10px 18px; 
  border: 1.5px solid var(--border-light); 
  border-radius: var(--radius-full); 
  font-size: 14px; 
  outline: none; 
  font-family: var(--font-sans); 
  background: var(--bg-primary); 
  transition: var(--transition-normal); 
  color: var(--text-primary);
}

.top-nav .nav-search input:focus { 
  border-color: var(--primary); 
  background: white; 
  box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
}

.top-nav .nav-search input::placeholder {
  color: var(--text-tertiary);
}

.top-nav .nav-right { 
  display: flex; 
  align-items: center; 
  gap: var(--space-4); 
  flex-shrink: 0; 
}

.top-nav .user-area { 
  display: flex; 
  align-items: center; 
  gap: var(--space-2); 
  font-size: 14px; 
  cursor: pointer; 
}

.top-nav .user-area .plan-tag { 
  background: linear-gradient(135deg, var(--primary-50), var(--primary-100));
  color: var(--primary); 
  padding: 4px 12px; 
  border-radius: var(--radius-full); 
  font-size: 11px; 
  font-weight: 600; 
}

/* === 按钮 - 现代风格 === */
.btn { 
  display: inline-flex; 
  align-items: center; 
  justify-content: center; 
  gap: var(--space-2); 
  padding: 10px 24px; 
  border-radius: var(--radius-md); 
  font-size: 14px; 
  font-weight: 500; 
  border: none; 
  cursor: pointer; 
  transition: var(--transition-normal); 
  text-decoration: none; 
  line-height: 1.4; 
  font-family: var(--font-sans); 
  position: relative;
  overflow: hidden;
}

.btn::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.2);
  transform: translate(-50%, -50%);
  transition: width 0.6s, height 0.6s;
}

.btn:active::before {
  width: 300px;
  height: 300px;
}

.btn-primary { 
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white; 
  box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
}

.btn-primary:hover { 
  background: linear-gradient(135deg, var(--primary-dark), #4338CA);
  box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
  transform: translateY(-1px);
}

.btn-outline { 
  background: transparent; 
  color: var(--primary); 
  border: 1.5px solid var(--primary); 
}

.btn-outline:hover { 
  background: var(--primary-50); 
  transform: translateY(-1px);
}

.btn-ghost { 
  background: transparent; 
  color: var(--text-secondary); 
}

.btn-ghost:hover { 
  background: var(--gray-100); 
}

.btn-sm { padding: 6px 14px; font-size: 13px; }

.btn-lg { 
  padding: 14px 32px; 
  font-size: 16px; 
  font-weight: 600;
}

.btn-block { width: 100%; }

/* === 标签 === */
.tag { 
  display: inline-flex; 
  align-items: center; 
  padding: 4px 12px; 
  border-radius: var(--radius-full); 
  font-size: 12px; 
  font-weight: 600; 
  letter-spacing: 0.3px;
}

.tag-risk-safe { background: #ECFDF5; color: #065F46; }
.tag-risk-mid { background: #FFF7ED; color: #C2410C; }
.tag-risk-high { background: #FEF2F2; color: #991B1B; }

/* === 卡片 - 玻璃态 + 悬浮效果 === */
.card { 
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-radius: var(--radius-lg); 
  border: 1px solid var(--border-light);
  overflow: hidden; 
  transition: var(--transition-normal);
}

.card:hover { 
  box-shadow: var(--shadow-lg);
  transform: translateY(-2px);
  border-color: var(--primary-200);
}

.card-body { padding: var(--space-6); }

.card-header { 
  padding: var(--space-4) var(--space-6); 
  border-bottom: 1px solid var(--border-light); 
  font-weight: 600; 
  font-size: 16px; 
  display: flex; 
  align-items: center; 
  justify-content: space-between; 
}

/* === 搜索框 - 现代风格 === */
.search-box { 
  display: flex; 
  align-items: center; 
  background: white; 
  border: 2px solid var(--border-light); 
  border-radius: var(--radius-xl); 
  padding: 6px 6px 6px 24px; 
  transition: var(--transition-normal); 
  max-width: 640px; 
  width: 100%; 
  box-shadow: var(--shadow-sm);
}

.search-box:focus-within { 
  border-color: var(--primary); 
  box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
  transform: translateY(-1px);
}

.search-box input { 
  flex: 1; 
  border: none; 
  outline: none; 
  font-size: 16px; 
  padding: 10px 0; 
  background: transparent; 
  color: var(--text-primary); 
  font-family: var(--font-sans); 
}

.search-box input::placeholder { 
  color: var(--text-tertiary); 
}

.search-box .search-btn { 
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white; 
  border: none; 
  padding: 12px 28px; 
  border-radius: calc(var(--radius-xl) - 4px); 
  font-size: 15px; 
  font-weight: 600; 
  cursor: pointer; 
  transition: var(--transition-normal); 
  font-family: var(--font-sans); 
  box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
}

.search-box .search-btn:hover { 
  background: linear-gradient(135deg, var(--primary-dark), #4338CA);
  box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
  transform: scale(1.02);
}

/* === 筛选标签 === */
.filter-group { display: flex; gap: var(--space-2); flex-wrap: wrap; }

.filter-tag { 
  padding: 8px 16px; 
  border-radius: var(--radius-full); 
  font-size: 13px; 
  font-weight: 500;
  border: 1.5px solid var(--border-light); 
  background: white; 
  color: var(--text-secondary); 
  cursor: pointer; 
  transition: var(--transition-normal); 
}

.filter-tag:hover { 
  border-color: var(--primary); 
  color: var(--primary); 
  background: var(--primary-50);
}

.filter-tag.active { 
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white; 
  border-color: var(--primary);
  box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
}

/* === 艺人卡片 - 现代风格 === */
.artist-card { 
  background: white;
  border-radius: var(--radius-lg); 
  border: 1px solid var(--border-light); 
  padding: var(--space-6); 
  cursor: pointer; 
  transition: var(--transition-normal); 
  display: flex; 
  gap: var(--space-5); 
  align-items: center;
  position: relative;
  overflow: hidden;
}

.artist-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--accent-cyan), var(--accent-purple));
  opacity: 0;
  transition: var(--transition-normal);
}

.artist-card:hover { 
  box-shadow: var(--shadow-lg); 
  transform: translateY(-3px); 
  border-color: var(--primary-200); 
}

.artist-card:hover::before {
  opacity: 1;
}

.artist-avatar { 
  width: 72px; 
  height: 72px; 
  border-radius: var(--radius-lg); 
  background: linear-gradient(135deg, var(--primary-100), var(--accent-cyan));
  display: flex; 
  align-items: center; 
  justify-content: center; 
  font-size: 28px; 
  font-weight: 700; 
  color: var(--primary); 
  flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
}

.artist-info { flex: 1; min-width: 0; }

.artist-name { 
  font-size: 17px; 
  font-weight: 600; 
  display: flex; 
  align-items: center; 
  gap: var(--space-2); 
  color: var(--text-primary);
}

.artist-meta { 
  font-size: 13px; 
  color: var(--text-tertiary); 
  margin-top: 6px; 
  line-height: 1.5;
}

.artist-tags { 
  display: flex; 
  gap: var(--space-1); 
  margin-top: var(--space-3); 
  flex-wrap: wrap; 
}

.artist-right { text-align: right; flex-shrink: 0; }

.artist-score { 
  font-size: 32px; 
  font-weight: 800; 
  letter-spacing: -1px;
}

.artist-score-label { 
  font-size: 11px; 
  color: var(--text-tertiary); 
  font-weight: 500;
}

.score-safe { color: var(--risk-safe); }
.score-mid { color: var(--risk-mid); }
.score-high { color: var(--risk-high); }
.score-pending { color: var(--risk-pending); }

/* === 统计卡片 - 渐变背景 === */
.stat-card { 
  background: white;
  border-radius: var(--radius-lg); 
  border: 1px solid var(--border-light); 
  padding: var(--space-8); 
  text-align: center;
  position: relative;
  overflow: hidden;
  transition: var(--transition-normal);
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--primary), var(--accent-cyan));
}

.stat-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-lg);
}

.stat-number { 
  font-size: 42px; 
  font-weight: 800; 
  background: linear-gradient(135deg, var(--primary), var(--accent-purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -1px;
}

.stat-label { 
  font-size: 14px; 
  color: var(--text-secondary); 
  margin-top: var(--space-2); 
  font-weight: 500;
}

/* === 数据表格 === */
.data-table { 
  width: 100%; 
  border-collapse: collapse; 
  font-size: 14px; 
}

.data-table th { 
  text-align: left; 
  padding: 14px 18px; 
  background: var(--gray-50); 
  color: var(--text-secondary); 
  font-weight: 600; 
  border-bottom: 1px solid var(--border-light); 
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.data-table td { 
  padding: 14px 18px; 
  border-bottom: 1px solid var(--border-light); 
  color: var(--text-primary);
}

.data-table tr { 
  transition: var(--transition-fast); 
}

.data-table tr:hover td { 
  background: var(--primary-50); 
}

/* === 进度条 === */
.progress-bar { 
  width: 100%; 
  height: 10px; 
  background: var(--gray-200); 
  border-radius: var(--radius-full); 
  overflow: hidden; 
}

.progress-fill { 
  height: 100%; 
  border-radius: var(--radius-full); 
  transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
  background: linear-gradient(90deg, var(--primary), var(--accent-cyan));
}

/* === 网格布局 === */
.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-5); }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-5); }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-5); }

.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.justify-center { justify-content: center; }
.gap-2 { gap: var(--space-2); }
.gap-4 { gap: var(--space-4); }
.gap-6 { gap: var(--space-6); }
.flex-1 { flex: 1; }
.mt-4 { margin-top: var(--space-4); }
.mt-6 { margin-top: var(--space-6); }
.mt-8 { margin-top: var(--space-8); }
.mb-4 { margin-bottom: var(--space-4); }
.mb-6 { margin-bottom: var(--space-6); }
.mb-8 { margin-bottom: var(--space-8); }
.p-6 { padding: var(--space-6); }
.text-center { text-align: center; }
.text-sm { font-size: 14px; }
.text-xs { font-size: 12px; }
.text-secondary { color: var(--text-secondary); }
.text-tertiary { color: var(--text-tertiary); }
.font-medium { font-weight: 500; }
.font-bold { font-weight: 700); }
.w-full { width: 100%; }
.divider { height: 1px; background: var(--border-light); margin: var(--space-6) 0; }

/* === Modal - 玻璃态 === */
.modal-overlay { 
  position: fixed; 
  top: 0; 
  left: 0; 
  right: 0; 
  bottom: 0; 
  background: rgba(15, 23, 42, 0.5);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 3000; 
  display: none; 
  align-items: center; 
  justify-content: center;
  animation: fadeIn 0.3s ease;
}

.modal-overlay.show { display: flex; }

.modal { 
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: var(--radius-xl); 
  max-width: 460px; 
  width: 90%; 
  max-height: 90vh; 
  overflow-y: auto; 
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
  border: 1px solid rgba(255, 255, 255, 0.8);
  animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

@keyframes slideUp {
  from { 
    opacity: 0; 
    transform: translateY(20px) scale(0.98); 
  }
  to { 
    opacity: 1; 
    transform: translateY(0) scale(1); 
  }
}

.modal-header { 
  padding: var(--space-6); 
  border-bottom: 1px solid var(--border-light); 
  display: flex; 
  align-items: center; 
  justify-content: space-between; 
}

.modal-header h3 { 
  font-size: 20px; 
  font-weight: 700; 
  color: var(--text-primary);
}

.modal-close { 
  width: 36px; 
  height: 36px; 
  border-radius: var(--radius-full); 
  border: none; 
  background: var(--gray-100); 
  cursor: pointer; 
  font-size: 20px; 
  color: var(--text-secondary); 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  transition: var(--transition-fast);
}

.modal-close:hover {
  background: var(--gray-200);
  transform: rotate(90deg);
}

.modal-body { padding: var(--space-6); }

.modal-footer { 
  padding: var(--space-4) var(--space-6); 
  border-top: 1px solid var(--border-light); 
  display: flex; 
  justify-content: flex-end; 
  gap: var(--space-3); 
}

/* === Auth Tabs === */
.auth-tabs { display: flex; border-bottom: 1px solid var(--border-light); }

.auth-tab { 
  flex: 1; 
  text-align: center; 
  padding: 14px; 
  font-size: 14px; 
  font-weight: 600; 
  color: var(--text-secondary); 
  cursor: pointer; 
  border-bottom: 2.5px solid transparent; 
  transition: var(--transition-normal); 
}

.auth-tab.active { 
  color: var(--primary); 
  border-bottom-color: var(--primary); 
}

.auth-tab:hover { color: var(--primary); }

.auth-form { padding-top: var(--space-5); }

.form-group { margin-bottom: var(--space-5); }

.form-group label { 
  display: block; 
  font-size: 13px; 
  font-weight: 600; 
  color: var(--text-secondary); 
  margin-bottom: var(--space-2); 
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.form-input { 
  width: 100%; 
  padding: 12px 16px; 
  border: 1.5px solid var(--border-light); 
  border-radius: var(--radius-md); 
  font-size: 15px; 
  outline: none; 
  font-family: var(--font-sans); 
  transition: var(--transition-normal); 
  background: var(--bg-primary);
  color: var(--text-primary);
}

.form-input:focus { 
  border-color: var(--primary); 
  box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
  background: white;
}

.form-error {

  color: var(--error); 
  margin-top: 6px; 
  display: flex;
  align-items: center;

}

.demo-login-btn {

  padding: 12px; 
  background: var(--gray-50); 
  border: 1.5px dashed var(--border-medium); 
  border-radius: var(--radius-md); 
  font-size: 13px; 
  color: var(--text-secondary); 
  cursor: pointer; 
  text-align: center; 
  transition: var(--transition-normal); 
  font-family: var(--font-sans); 
  font-weight: 500;
}

.demo-login-btn:hover { 
  border-color: var(--primary); 
  color: var(--primary); 
  background: var(--primary-50); 
}

/* === Hero Section - 科技感渐变 === */
.hero-section { 
  background: linear-gradient(135deg, #0F172A 0%, #1E293B 25%, #312E81 50%, #4C1D95 75%, #0F172A 100%);
  background-size: 400% 400%;
  animation: gradientShift 15s ease infinite;
  padding: 100px 24px 80px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.hero-section::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  opacity: 0.5;
}

.hero-section::after {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
              radial-gradient(circle at 70% 50%, rgba(168, 85, 247, 0.1) 0%, transparent 50%);
  animation: pulse 8s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.1); opacity: 0.8; }
}

.hero-inner { 
  max-width: 720px; 
  margin: 0 auto; 
  position: relative;
  z-index: 1;
}

.hero-logo { 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  gap: 14px; 
  margin-bottom: 24px; 
}

.hero-logo-icon { 
  width: 56px; 
  height: 56px;

  align-items: center; 
  justify-content: center;

}

.hero-logo-icon span {

}

.hero-logo span {

}

.hero-title {

  line-height: 1.1;
  letter-spacing: -1.5px;
  background: linear-gradient(135deg, #FFFFFF 0%, #E0E7FF 50%, #C7D2FE 100%);

  -webkit-text-fill-color: transparent;

}

.hero-subtitle { 
  color: rgba(255, 255, 255, 0.7);

  margin-bottom: 40px; 
  line-height: 1.6;

}

.hero-search-wrap { 
  max-width: 600px; 
  margin: 0 auto; 
}

.hero-hot { 
  display: flex; 
  justify-content: center; 
  gap: 24px; 
  margin-top: 24px; 
  flex-wrap: wrap;
}

.hero-hot-label { 
  color: rgba(255, 255, 255, 0.5); 
  font-size: 13px; 
  font-weight: 500;
}

.hero-hot a { 
  color: rgba(255, 255, 255, 0.85);

  transition: var(--transition-fast);
  font-weight: 500;
}

.hero-hot a:hover { 
  color: white; 
  border-bottom-color: rgba(255, 255, 255, 0.6);
}

/* === Detail Page === */
.detail-header {

  padding: 32px; 
  position: relative;

}

.detail-header::before {

.detail-header-inner {

.detail-avatar {

  font-weight: 700;

.detail-meta { flex: 1; min-width: 200px; }

.detail-title-row {

.detail-title-row h1 { 
  font-size: 32px;

}

.detail-subtitle {

  margin-top: 8px;

}

.detail-stats {

.detail-score-big {

}

.detail-score-label { 
  font-size: 13px; 
  color: var(--text-tertiary);

}

/* === Detail Tabs === */
.detail-tabs { 
  background: white; 
  border-bottom: 1px solid var(--border-light); 
  position: sticky; 
  top: 64px; 
  z-index: 100; 
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
}

.detail-tabs-inner { 
  max-width: 1280px; 
  margin: 0 auto; 
  display: flex; 
  padding: 0 var(--space-6);
}

.detail-tab-item { 
  padding: 16px 28px; 
  font-size: 15px; 
  color: var(--text-secondary); 
  border-bottom: 2.5px solid transparent; 
  text-decoration: none; 
  cursor: pointer; 
  font-weight: 500; 
  transition: var(--transition-normal); 
  position: relative;
}

.detail-tab-item:hover { 
  color: var(--primary); 
  background: var(--primary-50);
}

.detail-tab-item.active { 
  color: var(--primary); 
  border-bottom-color: var(--primary); 
  font-weight: 600;
}

.tab-content { display: none; }
.tab-content.active { display: block; animation: fadeIn 0.4s ease; }

/* === Upgrade Modal === */
.upgrade-features { 
  display: flex; 
  flex-direction: column; 
  gap: 16px; 
  margin: var(--space-5) 0; 
}

.upgrade-feature { 
  display: flex; 
  align-items: center; 
  gap: 12px; 
  font-size: 14px; 
  color: var(--text-secondary); 
  padding: 12px;
  background: var(--gray-50);
  border-radius: var(--radius-md);
  transition: var(--transition-fast);
}

.upgrade-feature:hover {
  background: var(--primary-50);
}

.upgrade-check { 
  width: 24px; 
  height: 24px; 
  background: linear-gradient(135deg, var(--primary), var(--accent-purple));
  border-radius: 50%; 
  color: white; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  font-size: 12px; 
  font-weight: 700; 
  flex-shrink: 0; 
  box-shadow: 0 4px 8px rgba(99, 102, 241, 0.3);
}

/* === Pagination === */
.pagination { 
  display: flex; 
  justify-content: center; 
  gap: var(--space-2); 
  margin-top: var(--space-8); 
}

.pagination .page-btn { 
  padding: 10px 16px; 
  border: 1.5px solid var(--border-light); 
  border-radius: var(--radius-md); 
  background: white; 
  cursor: pointer; 
  font-size: 14px; 
  font-family: var(--font-sans); 
  transition: var(--transition-normal); 
  font-weight: 500;
}

.pagination .page-btn:hover { 
  border-color: var(--primary); 
  color: var(--primary); 
  transform: translateY(-1px);
}

.pagination .page-btn.active { 
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white; 
  border-color: var(--primary);
  box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
}

.pagination .page-btn:disabled { 
  opacity: 0.4; 
  cursor: not-allowed; 
  transform: none;
}

/* === Responsive === */
@media (max-width: 768px) {
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  .hero-section { padding: 64px 16px 48px; }
  .hero-title { font-size: 32px; }
  .hero-search-wrap { max-width: 100%; }
  .hero-hot { gap: 12px; flex-wrap: wrap; }
  .page-content { padding: var(--space-4); }
  .top-nav { padding: 0 var(--space-4); gap: var(--space-2); }
  .top-nav .nav-search { max-width: 200px; }
  .detail-header-inner { gap: 16px; padding: 16px; }

.insight-section-body {

}

@media (max-width: 480px) {
  .insight-section-body { font-size: 13px; }

/* === Risk Event Timeline === */
.event-timeline { position: relative; padding-left: 0; }

.timeline-links { margin-top: 10px; }

.timeline-links a {

<body>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Top Navigation -->
<nav class="top-nav">
  <a class="logo" onclick="App.navigate('home')">

    <span class="logo-text">艺安查</span>

</nav>

<!-- Auth Modal -->
<div class="modal-overlay" id="authModal">

    </div>

          <input class="form-input" type="tel" id="loginPhone" placeholder="请输入手机号" maxlength="11" required>
        </div>
        <div class="form-group">
          <label>密码</label>
          <input class="form-input" type="password" id="loginPassword" placeholder="请输入密码" required>
        </div>
        <button class="btn btn-primary btn-block" type="submit">登录</button>
        <div style="text-align:center;margin:var(--space-4) 0; color:var(--text-tertiary); font-size:13px;">— 或 —</div>
        <button class="demo-login-btn" type="button" onclick="App.demoLogin()">演示账号一键登录（免费体验）</button>
      </form>
      <form id="registerForm" class="auth-form" style="display:none;" onsubmit="App.handleRegister(event)">
        <div class="form-group">
          <label>手机号</label>
          <input class="form-input" type="tel" id="regPhone" placeholder="请输入手机号" maxlength="11" required>
        </div>
        <div class="form-group">
          <label>密码</label>
          <input class="form-input" type="password" id="regPassword" placeholder="请设置密码（至少6位）" minlength="6" required>
        </div>
        <div class="form-group">
          <label>确认密码</label>
          <input class="form-input" type="password" id="regPassword2" placeholder="请再次输入密码" required>
        </div>
        <div class="form-group">
          <label>内测邀请码 <span style="color:var(--danger);">*</span></label>
          <div style="display:flex; gap:8px;">
            <input class="form-input" type="text" id="regInviteCode" placeholder="请输入邀请码（内测阶段必填）" maxlength="8" required style="flex:1;">
            <button type="button" class="btn btn-sm" onclick="App.verifyInviteCode()" style="white-space:nowrap;padding:8px 12px;">验证</button>
          </div>
          <div id="inviteVerifyMsg" style="font-size:12px; margin-top:4px;"></div>
        </div>
        <button class="btn btn-primary btn-block" type="submit" id="registerBtn">注册</button>
      </form>
    </div>
  </div>
</div>

<!-- Upgrade Modal -->
<div class="modal-overlay" id="upgradeModal">
  <div class="modal">
    <div class="modal-header">
      <h3>升级套餐</h3>
      <button class="modal-close" onclick="document.getElementById('upgradeModal').classList.remove('show')">×</button>

    <div class="modal-body">
      <p class="text-sm text-secondary">免费用户每日仅可查看 <strong>5</strong> 位艺人详情。</p>
      <div class="upgrade-features">
        <div class="upgrade-feature"><div class="upgrade-check">✓</div>每日查看 50 位艺人详情</div>
        <div class="upgrade-feature"><div class="upgrade-check">✓</div>生成 PDF 风险报告</div>
        <div class="upgrade-feature"><div class="upgrade-check">✓</div>实时舆情监测</div>
        <div class="upgrade-feature"><div class="upgrade-check">✓</div>API 数据接口</div>
        <div class="upgrade-feature"><div class="upgrade-check">✓</div>专属客服支持</div>
      </div>
      <button class="btn btn-primary btn-block btn-lg" onclick="App.showToast('敬请期待，专业版即将上线！', 'info');document.getElementById('upgradeModal').classList.remove('show')">了解套餐详情</button>
    </div>
  </div>
</div>

<!-- Page Container -->
<div class="page-wrap">
  <div id="pageContainer"></div>
</div>

<!-- Hidden file input for Excel import (offline fallback) -->
<input type="file" id="offlineFileInput" accept=".xlsx,.xls" style="display:none;">

<script src="app.js"></script>
</body>
</html>
