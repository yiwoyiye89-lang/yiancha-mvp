<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>艺安查 · 管理后台</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- 登录视图：登录表单置于沙箱 iframe（opaque origin），浏览器密码管理器/扩展不运行，从根源杜绝 autofill 白条注入 -->
  <div id="login-view" class="login-view">
    <iframe id="login-frame" class="login-frame" src="login-frame.html" sandbox="allow-scripts allow-forms" title="艺安查后台登录"></iframe>
  </div>

  <!-- 主控制台 -->
  <div id="app-view" class="app-view" hidden>
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">艺安查</span>
        <span class="brand-sub">管理后台</span>
      </div>
      <nav id="side-nav" class="side-nav"></nav>
      <div class="side-foot">
        <div class="staff-info">
          <div class="staff-name" id="staff-name">—</div>
          <div class="staff-role" id="staff-role">—</div>
        </div>
        <button id="logout-btn" class="logout-btn">退出登录</button>
      </div>
    </aside>
    <main class="content">
      <header class="topbar">
        <div class="crumb" id="crumb">运营看板</div>
        <div class="top-actions">
          <span class="env-tag">生产环境</span>
        </div>
      </header>
      <section id="page" class="page"></section>
    </main>
  </div>

  <!-- 模态层 -->
  <div id="modal-layer" class="modal-layer" hidden>
    <div class="modal-card" id="modal-card"></div>
  </div>
  <div id="toast" class="toast" hidden></div>

  <script src="app.js"></script>
</body>
</html>
