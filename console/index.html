<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>艺安查 · 管理后台</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- 登录视图 -->
  <div id="login-view" class="login-view">
    <div class="login-card">
      <div class="login-logo">艺安查</div>
      <div class="login-sub">运营 / 商务 / 风控 管理后台</div>
      <form id="login-form" autocomplete="off">
        <label>员工账号</label>
        <input id="username" type="text" autocomplete="off" placeholder="admin" required />
        <label>登录密码</label>
        <input id="password" type="text" autocomplete="off" placeholder="点击输入密码" required />
        <button type="submit" id="login-btn">登 录</button>
        <div id="login-error" class="login-error"></div>
      </form>
      <div class="login-foot">独立子域部署 · 仅限内部员工使用</div>
    </div>
  </div>

  <!-- 主控制台 -->
  <div id="app-view" class="app-view" hidden>
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">艺安查</span>
        <span class="brand-sub">管理后台</span>
      </div>
      <nav id="side-nav" class="side-nav"></nav>
      <div class="side-foot">
        <div class="staff-info">
          <div class="staff-name" id="staff-name">—</div>
          <div class="staff-role" id="staff-role">—</div>
        </div>
        <button id="logout-btn" class="logout-btn">退出登录</button>
      </div>
    </aside>
    <main class="content">
      <header class="topbar">
        <div class="crumb" id="crumb">运营看板</div>
        <div class="top-actions">
          <span class="env-tag">生产环境</span>
        </div>
      </header>
      <section id="page" class="page"></section>
    </main>
  </div>

  <!-- 模态层 -->
  <div id="modal-layer" class="modal-layer" hidden>
    <div class="modal-card" id="modal-card"></div>
  </div>
  <div id="toast" class="toast" hidden></div>

  <script src="app.js"></script>
</body>
</html>
